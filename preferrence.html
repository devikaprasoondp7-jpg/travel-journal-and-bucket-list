<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Travel Planner - Preferences</title>
    
    <style>
        body {
            background-color: rgb(185, 38, 92);
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: white;
            padding: 20px;
        }

        h1 { color: pink; }

        .container {
            background-color: rgba(255, 255, 255, 0.1);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 20px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 10px;
            width: 80%;
            margin-bottom: 20px;
        }

        .action-btn {
            padding: 12px 30px;
            background-color: deeppink;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome, <span id="userSpan">User</span>!</h1>
    
    <div class="container">
        <h2>Add to your Bucket List</h2>
        <select id="countrySelect">
            <option value="France">France 🇫🇷</option>
            <option value="Japan">Japan 🇯🇵</option>
            <option value="Italy">Italy 🇮🇹</option>
            <option value="Brazil">Brazil 🇧🇷</option>
            <option value="Australia">Australia 🇦🇺</option>
        </select>
        <br>
        <button class="action-btn" onclick="savePreference()">Add Country</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- REPLACE WITH THE SAME CONFIG FROM INDEX.HTML ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Make these global
        window.db = db;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.arrayUnion = arrayUnion;
    </script>

    <script>
        // Display the username
        const username = localStorage.getItem('userName');
        if (!username) {
            window.location.href = "index.html"; // Redirect if not logged in
        }
        document.getElementById('userSpan').innerText = username;

        async function savePreference() {
            const country = document.getElementById('countrySelect').value;
            
            try {
                // Reference to the user's document
                const userRef = window.doc(window.db, "users", username);
                
                // Update document to add country to a 'bucketList' array
                await window.updateDoc(userRef, {
                    bucketList: window.arrayUnion(country)
                });
                
                alert(country + " added to your list!");
            } catch (error) {
                console.error("Error saving preference:", error);
                alert("Failed to save. Check console for details.");
            }
        }
    </script>
</body>
</html>
